<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#0a0c0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="УхаантайПзд"/>
<title>УхаантайПзд</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0c0f;--surface:#111318;--surface2:#181c23;
  --border:#1e2530;--border2:#2a3340;
  --accent:#3b82f6;--accent-dim:rgba(59,130,246,0.12);
  --text:#e8ecf0;--muted:#6b7a8d;--muted2:#8a9ab0;
  --danger:#ff4d6d;
}
[data-theme="light"]{
  --bg:#f4f6f8;--surface:#ffffff;--surface2:#eef1f5;
  --border:#dde2ea;--border2:#c8cfda;
  --text:#0f1318;--muted:#7a8898;--muted2:#5a6a7a;
}
html,body{height:100%;overflow:hidden;font-family:'Syne',sans-serif;}
body{background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;padding-top:max(14px,env(safe-area-inset-top));background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.nav-logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:#ffffff;}
.nav-title{font-size:16px;font-weight:800;letter-spacing:-.3px;}
.nav-sub{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.icon-btn{width:36px;height:36px;border:1px solid var(--border);border-radius:9px;background:var(--surface2);color:var(--muted2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
.icon-btn:active{transform:scale(.93);}

.tabs{display:flex;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border);scrollbar-width:none;flex-shrink:0;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:10px 14px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;letter-spacing:.4px;text-transform:uppercase;transition:color .15s,border-color .15s;flex-shrink:0;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

.chat-output{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch;}
.empty-state{margin:auto;text-align:center;padding:40px 20px;}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.25;}
.empty-title{font-size:17px;color:var(--muted2);font-weight:700;margin-bottom:6px;}
.empty-sub{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;line-height:1.6;}
.empty-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px;}
.chip{padding:8px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;font-size:12px;color:var(--muted2);font-family:'JetBrains Mono',monospace;cursor:pointer;}
.chip:active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}

.bubble-user{background:var(--accent-dim);border:1px solid rgba(59,130,246,.25);border-radius:16px 16px 4px 16px;padding:12px 14px;font-size:14px;color:var(--text);align-self:flex-end;max-width:88%;line-height:1.5;}
.bubble-ai{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:4px 16px 16px 4px;padding:14px 16px;font-size:13px;color:var(--text);align-self:flex-start;max-width:100%;line-height:1.75;white-space:pre-wrap;font-family:'JetBrains Mono',monospace;}
.bubble-ai .ai-lbl{font-size:9px;font-weight:700;letter-spacing:1.8px;color:var(--accent);text-transform:uppercase;margin-bottom:8px;display:block;}
.bubble-err{border-left-color:var(--danger);}
.bubble-err .ai-lbl{color:var(--danger);}
.cursor{display:inline-block;width:2px;height:14px;background:var(--accent);margin-left:2px;animation:blink .7s infinite;vertical-align:middle;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.thinking{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;padding:4px 0;}
.dots{display:flex;gap:4px;}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:.3;animation:pls 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes pls{0%,100%{opacity:.3}50%{opacity:1}}

.input-bar{padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
#qinput{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-size:14px;font-family:'Syne',sans-serif;padding:10px 14px;resize:none;min-height:44px;max-height:120px;outline:none;transition:border-color .15s;line-height:1.5;}
#qinput:focus{border-color:var(--accent);}
#qinput::placeholder{color:var(--muted);}
.mic-btn{width:44px;height:44px;border:1px solid var(--border);border-radius:12px;background:var(--surface2);color:var(--muted2);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.mic-btn.listening{background:rgba(255,77,109,.15);border-color:var(--danger);animation:mpls 1s ease-in-out infinite;}
@keyframes mpls{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.send-btn{width:44px;height:44px;background:var(--accent);border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s,transform .1s;}
.send-btn:active{transform:scale(.93);}
.send-btn:disabled{opacity:.3;}
.send-btn svg{width:20px;height:20px;fill:#0a0c0f;}

.hist-list{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;}
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;}
.hist-card:active{border-color:var(--accent);}
.hist-q{font-size:13px;color:var(--text);margin-bottom:6px;line-height:1.4;font-weight:600;}
.hist-a{font-size:12px;color:var(--muted2);font-family:'JetBrains Mono',monospace;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.hist-meta{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.hist-time{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.hist-tag{font-size:10px;padding:2px 8px;border-radius:5px;background:var(--accent-dim);color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:600;}
.clear-btn{font-size:12px;color:var(--danger);font-family:'JetBrains Mono',monospace;background:none;border:1px solid rgba(255,77,109,.3);border-radius:7px;padding:6px 14px;cursor:pointer;}
.hist-empty{margin:auto;text-align:center;padding:60px 20px;}

.quick-grid{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;}
.qs-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:8px 0 4px;}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;}
.qcard:active{border-color:var(--accent);background:var(--accent-dim);}
.qcard-tag{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace;}
.qcard-text{font-size:13px;color:var(--muted2);font-family:'JetBrains Mono',monospace;line-height:1.4;}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:10px 18px;font-size:13px;color:var(--text);font-family:'JetBrains Mono',monospace;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Install banner */
.install-bar{display:none;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--accent-dim);border-bottom:1px solid rgba(0,229,160,.2);flex-shrink:0;}
.install-bar.show{display:flex;}
.install-text{font-size:12px;color:var(--accent);font-family:'JetBrains Mono',monospace;}
.install-btn{font-size:12px;font-weight:700;color:#0a0c0f;background:var(--accent);border:none;border-radius:7px;padding:6px 14px;cursor:pointer;font-family:'Syne',sans-serif;}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-logo">
    <div class="logo-mark">Σ</div>
    <div>
      <div class="nav-title">УхаантайПзд</div>
      <div class="nav-sub">Бодлого бодож өгдөг сайн ах</div>
      
    </div>
  </div>
  <div style="display:flex;gap:6px;">
    <button class="icon-btn" id="theme-btn">🌙</button>
  </div>
</div>

<div class="install-bar" id="install-bar">
  <span class="install-text">📱 Дэлгэцэнд нэмэх</span>
  <button class="install-btn" id="install-btn">Суулгах</button>
</div>

<div class="tabs">
  <button class="tab active" data-screen="chat">💬 Бодох</button>
  <button class="tab" data-screen="quick">⚡ Жишээ</button>
  <button class="tab" data-screen="history">📋 Түүх</button>
</div>

<div class="screen active" id="screen-chat">
  <div class="chat-output" id="output">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">∑</div>
      <div class="empty-title">Бодлого оруул бодоод өгье агаан дүү</div>
      <div class="empty-sub"></div>
      <div class="empty-chips">
        <div class="chip" onclick="fillAndSend('Биномын тархалт n=10, p=0.4 үед P(X=3) хэд вэ?')">Биномын P(X=3)</div>
        <div class="chip" onclick="fillAndSend('Нормаль тархалт μ=75, σ=8 үед P(X≤70) хэд вэ?')">Нормаль P(X≤70)</div>
        <div class="chip" onclick="fillAndSend('15-аас 4-ийг сонгох комбинацийн тоо?')">C(15,4)</div>
        <div class="chip" onclick="fillAndSend('t-тест: t=2.3, df=18, хоёр талт p-утга?')">t-тест</div>
      </div>
    </div>
  </div>
  <div class="input-bar">
    <textarea id="qinput" placeholder="Монголоор бодлого бич..." rows="1"></textarea>
    <button class="mic-btn" id="mic-btn">🎤</button>
    <button class="send-btn" id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div class="screen" id="screen-quick">
  <div class="quick-grid" id="quick-grid"></div>
</div>

<div class="screen" id="screen-history">
  <div style="padding:12px 16px 0;display:flex;justify-content:flex-end;">
    <button class="clear-btn" onclick="clearHistory()">Бүгдийг устгах</button>
  </div>
  <div class="hist-list" id="hist-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// THEME
let theme=localStorage.getItem('theme')||'dark';
function applyTheme(t){document.documentElement.setAttribute('data-theme',t==='light'?'light':'');document.getElementById('theme-btn').textContent=t==='light'?'🌑':'🌙';}
applyTheme(theme);
document.getElementById('theme-btn').onclick=()=>{theme=theme==='dark'?'light':'dark';localStorage.setItem('theme',theme);applyTheme(theme);};

// PWA install prompt
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  document.getElementById('install-bar').classList.add('show');
});
document.getElementById('install-btn').onclick=async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById('install-bar').classList.remove('show');
  if(outcome==='accepted') showToast('Апп суулгагдлаа ✓');
};

// TABS
document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('screen-'+tab.dataset.screen).classList.add('active');
    if(tab.dataset.screen==='history')renderHistory();
  };
});

// HISTORY
let solveHistory=JSON.parse(localStorage.getItem('solveHistory')||'[]');
function detectTag(q){const map={магадлал:'Магадлал',нормаль:'Нормаль',бином:'Биномын',пуассон:'Пуассон',комбинац:'Комбинац',регресс:'Регресс',корреляц:'Корреляц','t-тест':'Таамаглал',хи:'Хи-квадрат',геометр:'Геометр'};for(const[k,v]of Object.entries(map))if(q.toLowerCase().includes(k))return v;return 'Статистик';}
function saveToHistory(q,a){const e={id:Date.now(),q,a,tag:detectTag(q),time:new Date().toLocaleString('mn-MN')};solveHistory.unshift(e);if(solveHistory.length>60)solveHistory=solveHistory.slice(0,60);localStorage.setItem('solveHistory',JSON.stringify(solveHistory));}
function clearHistory(){if(!confirm('Бүх түүхийг устгах уу?'))return;solveHistory=[];localStorage.setItem('solveHistory','[]');renderHistory();showToast('Түүх устгагдлаа');}
function renderHistory(){
  const list=document.getElementById('hist-list');
  if(!solveHistory.length){list.innerHTML='<div class="hist-empty"><div class="empty-icon" style="font-size:40px;opacity:.2">📋</div><p style="color:var(--muted2);margin-top:12px;font-family:JetBrains Mono,monospace;font-size:13px;">Түүх хоосон байна</p></div>';return;}
  list.innerHTML=solveHistory.map(e=>`<div class="hist-card" onclick="reuseHistory(${e.id})"><div class="hist-q">${esc(e.q)}</div><div class="hist-a">${esc(e.a)}</div><div class="hist-meta"><span class="hist-time">${e.time}</span><span class="hist-tag">${e.tag}</span></div></div>`).join('');
}
function reuseHistory(id){
  const e=solveHistory.find(x=>x.id==id);if(!e)return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelector('[data-screen="chat"]').classList.add('active');
  document.getElementById('screen-chat').classList.add('active');
  fillAndSend(e.q);
}

// QUICK
const quickProblems=[
  {tag:'Магадлал',items:['Биномын тархалт n=12, p=0.35 үед P(X=4) хэд вэ?','P(A∪B) = ? хэрэв P(A)=0.4, P(B)=0.3, P(A∩B)=0.1','Байесын теорем: мэдрэмж=0.99, өвөрмөц=0.95, тархалт=0.001','4 шоо хаяхад наад зах нь нэг 6 гарах магадлал?']},
  {tag:'Тархалт',items:['Нормаль μ=75, σ=8 үед P(X≤70) хэд вэ?','Пуассон λ=6 тархалтын дундаж ба дисперс?','Нормаль μ=100, σ=15 тархалтын 95-р перцентиль?','Геометр p=0.2 үед P(X≤3)?']},
  {tag:'Комбинаторик',items:['9 номноос 5-ийг ямар олон аргаар зохион байгуулах вэ?','15-аас 4-ийг сонгох комбинацийн тоо?','СТАТИСТИК үгийн үсгүүдийн переставкийн тоо?','Давтагдахгүй 3 оронтой ПИН код хэд байх вэ?']},
  {tag:'Таамаглал',items:['t-тест: t=2.3, df=18, хоёр талт p-утга?','Хи-квадрат: ажиглагдсан=[20,30,50], хүлээгдсэн=[25,25,50]','Z-тест: x̄=52, μ₀=50, σ=5, n=30','p=0.03 ба α=0.05 үед нэг талт тестийн дүгнэлт?']},
  {tag:'Регресс',items:['[1,2,3,4,5] ба [2,4,5,4,5] өгөгдлийн Пирсоны корреляц?','x=[1,2,3], y=[2,4,5] шугаман регрессийн тэгшитгэл?','x=[2,4,6,8], y=[3,7,11,15]-ын налуу ба огтлол?','R²=0.85 утгыг тайлбарлана уу?']},
];
function renderQuick(){document.getElementById('quick-grid').innerHTML=quickProblems.map(s=>`<div class="qs-label">${s.tag}</div>${s.items.map(i=>`<div class="qcard" onclick="quickSolve('${esc(i)}')"><div class="qcard-tag">${s.tag.toUpperCase()}</div><div class="qcard-text">${esc(i)}</div></div>`).join('')}`).join('');}
function quickSolve(q){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.querySelector('[data-screen="chat"]').classList.add('active');document.getElementById('screen-chat').classList.add('active');fillAndSend(q);}
renderQuick();

// SOLVE via backend
async function solve(question){
  const output=document.getElementById('output');
  document.getElementById('empty-state')?.remove();
  const ub=document.createElement('div');ub.className='bubble-user';ub.textContent=question;output.appendChild(ub);
  const th=document.createElement('div');th.className='thinking';th.innerHTML='<div class="dots"><span></span><span></span><span></span></div> тооцоолж байна...';output.appendChild(th);
  output.scrollTop=output.scrollHeight;
  document.getElementById('send-btn').disabled=true;

  try{
    const fetchRes=await fetch('/api/solve',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question})
    });
    th.remove();
    if(!fetchRes.ok)throw new Error('Сервер алдаа: '+fetchRes.status);
    const data=await fetchRes.json();
    if(data.error)throw new Error(data.error);
    const full=(data.text||'').trim();
    if(!full)throw new Error('Хариу хоосон ирлээ — дахин оролдоно уу');

    const ab=document.createElement('div');ab.className='bubble-ai';
    ab.innerHTML='<span class="ai-lbl">∑ УхаантайПзд</span>'+esc(full);
    output.appendChild(ab);
    saveToHistory(question,full);
  }catch(e){
    th.remove();
    const eb=document.createElement('div');eb.className='bubble-ai bubble-err';
    eb.innerHTML=`<span class="ai-lbl">Алдаа</span>${esc(e.message||'Холболт тасарлаа')}`;
    output.appendChild(eb);
  }
  document.getElementById('send-btn').disabled=false;
  output.scrollTop=output.scrollHeight;
}

function fillAndSend(q){const i=document.getElementById('qinput');i.value=q;resize(i);doSend();}
function doSend(){const i=document.getElementById('qinput');const q=i.value.trim();if(!q)return;i.value='';i.style.height='auto';solve(q);}
const inp=document.getElementById('qinput');
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
inp.addEventListener('input',()=>resize(inp));
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}});
document.getElementById('send-btn').onclick=doSend;

// VOICE
let recognition=null,listening=false;
const micBtn=document.getElementById('mic-btn');
if('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='mn-MN';recognition.continuous=false;recognition.interimResults=true;
  recognition.onresult=e=>{let f='',t='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)f+=e.results[i][0].transcript;else t+=e.results[i][0].transcript;}inp.value=f||t;resize(inp);};
  recognition.onend=()=>{listening=false;micBtn.classList.remove('listening');micBtn.textContent='🎤';if(inp.value.trim())doSend();};
  recognition.onerror=()=>{listening=false;micBtn.classList.remove('listening');micBtn.textContent='🎤';showToast('Дуу таних алдаа');};
  micBtn.onclick=()=>{if(listening){recognition.stop();return;}listening=true;micBtn.classList.add('listening');micBtn.textContent='⏹';inp.value='';recognition.start();};
}else{micBtn.style.opacity='.3';micBtn.onclick=()=>showToast('Chrome дэмждэг');}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// PWA manifest
